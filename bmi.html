<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>
<link rel="stylesheet" href="app.css">
</head>

<body>
<div class="app-container">
<header class="header">
<div class="header-content">
<div class="logo">
<img src="https://images.unsplash.com/photo-1559757148-5c350d0d3c56?w=40&h=40&fit=crop&crop=face" alt="BMI Calculator Logo" style="width: 40px; height: 40px; border-radius: 50%; margin-right: 10px;">
<h1>BMI Calculator</h1>
</div>
<nav class="nav">
<a href="fitness.html" class="nav-btn">Dashboard</a>
<a href="activity.html" class="nav-btn">Activity</a>
<a href="bmi.html" class="nav-btn active">BMI</a>
<a href="water.html" class="nav-btn">Water</a>
<a href="progress.html" class="nav-btn">Progress</a>
</nav>
</div>
</header>

<main class="main-content">
<div class="page active">
<div class="page-header">
<h2>Calculate Your BMI</h2>
<p>Body Mass Index helps you understand your weight status</p>
</div>

<div class="bmi-calculator">
<h3>Enter Your Details</h3>
<div class="form-group">
<label for="height">Height (cm)</label>
<input type="number" id="height" placeholder="Enter height in centimeters">
</div>
<div class="form-group">
<label for="weight">Weight (kg)</label>
<input type="number" id="weight" placeholder="Enter weight in kilograms">
</div>
<button class="btn-primary" onclick="calculateBMI()">⚖️ Calculate BMI</button>
</div>

<div class="bmi-result">
<div id="bmiResult" class="result-card" style="display: none;">
<i>⚖️</i>
<h3>Your BMI</h3>
</div>
</div>

<div class="bmi-info">
<h3>BMI Categories</h3>
<div class="bmi-categories">
<div class="category underweight">
<span class="label underweight">Underweight</span>
<span class="range">&lt; 18.5</span>
</div>
<div class="category normal">
<span class="label normal">Normal</span>
<span class="range">18.5 - 24.9</span>
</div>
<div class="category overweight">
<span class="label overweight">Overweight</span>
<span class="range">25 - 29.9</span>
</div>
<div class="category obese">
<span class="label obese">Obese</span>
<span class="range">≥ 30</span>
</div>
</div>
</div>
</div>
</main>
</div>

<script src="script.js"></script>

</body>
</html>
