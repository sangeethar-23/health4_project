<!DOCTYPE html>
<html>
<head>
<title>Activity Tracker</title>
<link rel="stylesheet" href="app.css">
</head>

<body>
<div class="app-container">
<header class="header">
<div class="header-content">
<div class="logo">
<img src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=40&h=40&fit=crop&crop=face" alt="Activity Tracker Logo" style="width: 40px; height: 40px; border-radius: 50%; margin-right: 10px;">
<h1>Activity Tracker</h1>
</div>
<nav class="nav">
<a href="fitness.html" class="nav-btn">Dashboard</a>
<a href="activity.html" class="nav-btn active">Activity</a>
<a href="bmi.html" class="nav-btn">BMI</a>
<a href="water.html" class="nav-btn">Water</a>
<a href="progress.html" class="nav-btn">Progress</a>
</nav>
</div>
</header>

<main class="main-content">
<div class="page active">
<div class="page-header">
<h2>Track Your Activity</h2>
<p>Log your exercises and monitor your workout routine</p>
</div>

<div class="activity-form">
<h3>Add New Activity</h3>
<div class="form-group">
<label for="exercise">Exercise Name</label>
<input type="text" id="exercise" placeholder="Enter exercise name">
</div>
<div class="form-group">
<label for="duration">Duration (minutes)</label>
<input type="number" id="duration" placeholder="Enter duration">
</div>
<button class="btn-primary" onclick="addActivity()">➕ Add Activity</button>
</div>

<div class="activities-list">
<h3>Your Activities</h3>
<ul id="activityList" class="activity-items">
</ul>
</div>
</div>
</main>
</div>

<script src="script.js"></script>

</body>
</html>
